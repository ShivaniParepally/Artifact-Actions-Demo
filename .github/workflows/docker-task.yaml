name: Docker Build Push and Test

on:
  push:
    branches: [main]

jobs:
  docker-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mypackagesimage:latest

      - name: Pull image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mypackagesimage:latest

      - name: Run container and print CLI versions
        run: |
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/mypackagesimage:latest bash -c "
          python3 --version &&
          pwsh --version &&
          dotnet --version
          "