name : Artifacts Demo

on :
  push:
    branches : [main]
  
jobs:
  build:
    runs-on : windows-latest
    steps:
    - name : Checkout code
      uses : actions/checkout@v4

    - name : Create artifact
      uses : actions/upload-artifact@v4
      with:
        name : artifact-demo
        path : |
          description.txt
          file2.txt
          index.html
          styles.css

        